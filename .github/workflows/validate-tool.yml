name: Validate Tool Submission

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed tool directories
        id: tools
        run: |
          DIRS=$(git diff --name-only origin/main...HEAD | grep -oP '^[^/]+' | sort -u | grep -vE '^\.|docs|README|CONTRIBUTING|LICENSE' || true)
          echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"
          echo "Changed tool dirs: $DIRS"

      - name: Check README exists
        run: |
          for dir in ${{ steps.tools.outputs.dirs }}; do
            if [ -d "$dir" ] && [ ! -f "$dir/README.md" ]; then
              echo "::error::$dir is missing README.md"
              exit 1
            fi
          done

      - name: Scan for secrets
        run: |
          FAIL=0
          for dir in ${{ steps.tools.outputs.dirs }}; do
            [ -d "$dir" ] || continue
            # Check for common secret patterns
            if grep -rEi '(api[_-]?key|secret[_-]?key|password|token)\s*[:=]\s*["\x27][A-Za-z0-9+/=_-]{20,}' "$dir" --include='*.py' --include='*.js' --include='*.sh' --include='*.ts' 2>/dev/null; then
              echo "::error::Possible hardcoded secret in $dir"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Lint shell scripts
        run: |
          if command -v shellcheck &>/dev/null; then
            find ${{ steps.tools.outputs.dirs }} -name '*.sh' -exec shellcheck -S warning {} + 2>/dev/null || true
          fi

      - name: Check self-contained
        run: |
          for dir in ${{ steps.tools.outputs.dirs }}; do
            [ -d "$dir" ] || continue
            # Warn if tool references other tool directories
            if grep -rn '\.\./\(tb\|anthropic-usage\|cleanup-backups\|ig-download\)' "$dir" 2>/dev/null; then
              echo "::warning::$dir references other tool directories — tools should be self-contained"
            fi
          done

  auto-label:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Check agent token
        env:
          SUBMIT_TOKEN: ${{ secrets.TOOLS_SUBMIT_TOKEN }}
        run: |
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q .body)
          TOKEN_LINE=$(echo "$BODY" | grep -oP 'token:\s*\K\S+' || true)
          if [ -n "$TOKEN_LINE" ] && [ "$TOKEN_LINE" = "$SUBMIT_TOKEN" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "agent-submission"
            echo "Valid agent submission — labeled for fast-track review"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
